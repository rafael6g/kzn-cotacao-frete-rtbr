<!--
  Painel de progresso em tempo real via SSE.
  Conecta em GET /cotacoes/{lote_id}/progresso e escuta eventos.
-->
<div
  class="card bg-base-100 shadow-xl"
  id="painel-progresso-container"
>
  <div class="card-body">
    <h3 class="card-title" style="color:#f5a0a0;">
      ⏳ Processando: <span class="font-mono ml-2 text-white">{{ lote.nome }}</span>
    </h3>

    <!-- Barra de progresso -->
    <div class="my-3">
      <div class="flex justify-between text-sm mb-1">
        <span id="progresso-texto">Iniciando...</span>
        <span id="progresso-pct" class="font-bold" style="color:#f5a0a0;">0%</span>
      </div>
      <progress
        id="barra-progresso"
        class="progress w-full"
        style="accent-color:#BF181B;"
        value="0"
        max="{{ total }}"
      ></progress>
      <div class="flex gap-4 text-xs mt-1 text-gray-500">
        <span>Total: <b>{{ total }}</b></span>
        <span id="ct-cache" class="text-blue-400">Cache: <b>0</b></span>
        <span id="ct-site" class="text-gray-300">Site: <b>0</b></span>
        <span id="ct-erro" class="text-red-400">Erros: <b>0</b></span>
      </div>
    </div>

    <!-- Painel de fila (oculto; aparece quando fila_aguardando recebido) -->
    <div id="painel-fila" class="hidden my-3 rounded border border-amber-800/40 bg-amber-950/20 px-4 py-3 text-sm">
      <p class="text-amber-400 font-semibold">⏳ Aguardando na fila...</p>
      <p class="text-amber-200 mt-1">Você é o <span id="fila-posicao" class="font-bold">?</span>º da fila</p>
      <div id="fila-ativo-info" class="mt-3 border-t border-amber-800/30 pt-2 hidden">
        <p class="text-gray-400 text-xs font-semibold">🔍 Processando agora:</p>
        <p class="text-gray-300 text-xs mt-1">
          <span id="fila-ativo-nome" class="font-semibold text-white"></span>
          — Rota <span id="fila-ativo-linha">0</span> de <span id="fila-ativo-total">0</span>
        </p>
        <p class="text-amber-100 text-xs font-mono mt-1" id="fila-ativo-rota"></p>
      </div>
      <p class="text-gray-500 text-xs mt-2 italic">Sua vez começa em breve.</p>
    </div>

    <!-- Consulta atual -->
    <div id="consulta-atual" class="hidden my-2 rounded border border-yellow-800/40 bg-yellow-950/30 px-3 py-2 text-sm">
      <span class="text-yellow-500 font-semibold">🔍 Consultando agora:</span>
      <span id="consulta-atual-texto" class="ml-2 font-mono text-yellow-200"></span>
    </div>

    <!-- Log em tempo real -->
    <div class="border rounded bg-gray-950 text-gray-300 p-3 h-64 overflow-y-auto log-box" id="log-container">
      <div class="text-gray-500 italic">Aguardando início...</div>
    </div>

    <!-- Botões (aparecem ao concluir) -->
    <div id="area-download" class="mt-3 hidden flex flex-col gap-2">
      <a
        id="btn-download"
        href="#"
        class="btn w-full gap-2 text-white font-semibold"
        style="background:#BF181B; border:none; box-shadow: 0 0 16px rgba(191,24,27,0.35);"
        download
      >
        ⬇ Baixar Excel
      </a>
      <button
        onclick="if(typeof fecharModalProgresso==='function') fecharModalProgresso()"
        class="btn w-full btn-ghost text-gray-400 hover:text-white"
      >
        Fechar
      </button>
    </div>

    <!-- Área de erro crítico (aparece só em falha) -->
    <div id="area-erro" class="mt-3 hidden">
      <div class="rounded border border-red-800 bg-red-950/40 p-3 text-xs text-red-300 font-mono whitespace-pre-wrap" id="detalhe-erro"></div>
      <button onclick="copiarErro()" class="btn btn-xs w-full mt-2 text-gray-400 hover:text-white" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);">
        📋 Copiar erro
      </button>
    </div>

  </div>
</div>

<script>
(function() {
  const loteId  = {{ lote.id }};
  const total   = {{ total }};
  let cache = 0, site = 0, erros = 0, processadas = 0;

  const barra   = document.getElementById("barra-progresso");
  const pct     = document.getElementById("progresso-pct");
  const texto   = document.getElementById("progresso-texto");
  const log     = document.getElementById("log-container");
  const ctCache = document.getElementById("ct-cache");
  const ctSite  = document.getElementById("ct-site");
  const ctErro  = document.getElementById("ct-erro");
  const areaDownload   = document.getElementById("area-download");
  const btnDownload    = document.getElementById("btn-download");
  const areaErro       = document.getElementById("area-erro");
  const detalheErro    = document.getElementById("detalhe-erro");
  const consultaAtual  = document.getElementById("consulta-atual");
  const consultaTexto  = document.getElementById("consulta-atual-texto");
  const painelFila     = document.getElementById("painel-fila");
  const filaPosicao    = document.getElementById("fila-posicao");
  const filaAtivoInfo  = document.getElementById("fila-ativo-info");
  const filaAtivoNome  = document.getElementById("fila-ativo-nome");
  const filaAtivoLinha = document.getElementById("fila-ativo-linha");
  const filaAtivoTotal = document.getElementById("fila-ativo-total");
  const filaAtivoRota  = document.getElementById("fila-ativo-rota");

  function adicionarLog(msg, cor = "text-gray-300") {
    const linha = document.createElement("div");
    linha.className = `${cor} sse-item-novo`;
    linha.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    log.appendChild(linha);
    log.scrollTop = log.scrollHeight;
    // Limita o log a 200 linhas
    while (log.children.length > 200) log.removeChild(log.firstChild);
  }

  function atualizarContadores() {
    ctCache.innerHTML = `Cache: <b>${cache}</b>`;
    ctSite.innerHTML  = `Site: <b>${site}</b>`;
    ctErro.innerHTML  = `Erros: <b>${erros}</b>`;
    barra.value = processadas;
    const p = total > 0 ? Math.round((processadas / total) * 100) : 0;
    pct.textContent = `${p}%`;
  }

  // Conecta ao SSE
  const evtSource = new EventSource(`/cotacoes/${loteId}/progresso`);

  evtSource.onmessage = function(e) {
    const evento = JSON.parse(e.data);

    switch (evento.tipo) {
      case "conectado":
        adicionarLog("✅ Conectado ao servidor. Aguardando início...", "text-gray-400");
        break;

      case "fila_aguardando":
        painelFila.classList.remove("hidden");
        filaPosicao.textContent = evento.posicao;
        if (evento.ativo_nome) {
          filaAtivoNome.textContent = evento.ativo_nome;
          filaAtivoLinha.textContent = evento.ativo_linha || 0;
          filaAtivoTotal.textContent = evento.ativo_total || 0;
          filaAtivoRota.textContent = (evento.ativo_origem && evento.ativo_destino)
            ? `${evento.ativo_origem} → ${evento.ativo_destino}` : "";
          filaAtivoInfo.classList.remove("hidden");
        }
        break;

      case "fila_iniciando":
        painelFila.classList.add("hidden");
        filaAtivoInfo.classList.add("hidden");
        break;

      case "inicio":
        adicionarLog(`🚀 ${evento.mensagem}`, "text-yellow-300");
        break;

      case "consultando":
        consultaTexto.textContent = `${evento.origem} → ${evento.destino}`;
        consultaAtual.classList.remove("hidden");
        texto.textContent = `Consultando ${evento.linha} de ${total}...`;
        break;

      case "item":
        // Oculta "consultando agora" quando o item termina
        consultaAtual.classList.add("hidden");

        processadas = evento.linha;
        if (evento.fonte === "cache") cache++;
        else if (evento.status === "ok") site++;
        else erros++;

        const cor = evento.status === "ok"
          ? (evento.fonte === "cache" ? "text-blue-400" : "text-gray-200")
          : "text-red-400";
        const icone = evento.status === "ok" ? "✓" : "✗";
        const fonte = evento.fonte === "cache" ? "[CACHE]" : "[SITE] ";

        const duracao = evento.duracao_segundos ? `  ⏱${evento.duracao_segundos}s` : "";
        adicionarLog(
          `${icone} ${fonte} ${evento.origem} → ${evento.destino}` +
          (evento.status === "ok"
            ? `  |  ${evento.distancia || ""}  pedágio: ${evento.pedagio || ""}  total: ${evento.total || ""}${duracao}`
            : `  ERRO: ${evento.mensagem}`),
          cor
        );
        texto.textContent = `Processando ${evento.linha} de ${total}...`;
        atualizarContadores();
        break;

      case "delay":
        adicionarLog(`⏱ ${evento.mensagem}`, "text-gray-400");
        break;

      case "fim":
        consultaAtual.classList.add("hidden");
        adicionarLog(
          `🏁 ${evento.mensagem}`,
          evento.status === "concluido" ? "text-white font-bold" : "text-red-300 font-bold"
        );
        texto.textContent = "Concluído!";
        pct.textContent = "100%";
        barra.value = total;
        // Não fechar aqui — aguarda "download_pronto" que vem em seguida
        break;

      case "download_pronto":
        evtSource.close();
        if (cache + site > 0) {
          adicionarLog(`📥 ${evento.mensagem}`, "text-yellow-300 font-bold");
          btnDownload.href = `/cotacoes/${loteId}/download`;
          areaDownload.classList.remove("hidden");
        } else {
          adicionarLog("⚠ Todas as linhas falharam — nenhum resultado para baixar.", "text-orange-400 font-bold");
        }
        break;

      case "erro_critico":
        adicionarLog(`💥 ERRO CRÍTICO: ${evento.mensagem}`, "text-red-400 font-bold");
        texto.textContent = "Erro — processamento interrompido";
        pct.textContent = "✗";
        pct.style.color = "#f87171";
        areaErro.classList.remove("hidden");
        detalheErro.textContent = evento.mensagem;
        evtSource.close();
        break;
    }
  };

  evtSource.onerror = function() {
    adicionarLog("⚠ Conexão SSE interrompida.", "text-orange-400");
    evtSource.close();
  };

})();

function copiarErro() {
  const texto = document.getElementById("detalhe-erro").textContent;
  navigator.clipboard.writeText(texto).then(function() {
    const btn = event.target;
    const original = btn.textContent;
    btn.textContent = "✅ Copiado!";
    setTimeout(function() { btn.textContent = original; }, 2000);
  });
}
</script>
