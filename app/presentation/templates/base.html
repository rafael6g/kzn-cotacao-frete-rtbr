<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cotações{% endblock %} — Real94</title>

  <!-- DaisyUI + Tailwind via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <!-- SSE extension -->
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>

  <style>
    /* ── Custom tokens ── */
    :root {
      --brand: #BF181B;
      --brand-light: #E92320;
      --brand-glow: rgba(191, 24, 27, 0.40);
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.10);
      --surface: #180a0a;
      --surface-2: #1e0c0c;
    }

    body {
      background-color: #0d0808;
      color: #f0eded;
    }

    /* ── Glass card ── */
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1rem;
    }

    /* ── Glow effect for primary buttons ── */
    .btn-brand {
      background: var(--brand);
      color: #fff;
      border: none;
      box-shadow: 0 0 18px var(--brand-glow);
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .btn-brand:hover {
      background: var(--brand-light);
      box-shadow: 0 0 30px var(--brand-glow);
      transform: translateY(-1px);
    }

    /* ── Input focus ring ── */
    .input:focus, .select:focus, .file-input:focus {
      outline: 2px solid var(--brand);
      outline-offset: 1px;
    }

    /* ── SSE animations ── */
    .sse-item-novo { animation: fadeSlide 0.35s ease-out; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Log box ── */
    .log-box {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      border-radius: 0.5rem;
    }

    /* ── Navbar blur ── */
    .navbar-blur {
      background: rgba(13, 8, 8, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
    }

    /* ── Green accent text ── */
    .text-brand { color: var(--brand-light); }
    .text-brand-dim { color: var(--brand); }

    /* ── Section divider ── */
    .section-divider {
      border-color: var(--glass-border);
    }

    /* ── Custom Select Component ── */
    .cs-wrap { position: relative; }
    .cs-btn {
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
      cursor: pointer; text-align: left; width: 100%; height: 2rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.375rem;
      padding: 0 0.75rem;
      color: #e5e7eb;
      font-size: 0.875rem;
      transition: border-color 0.15s;
      user-select: none;
    }
    .cs-btn:hover { border-color: rgba(255,255,255,0.2); }
    .cs-btn:focus { outline: 2px solid var(--brand); outline-offset: 1px; }
    .cs-btn.cs-disabled { opacity: 0.35; pointer-events: none; }
    .cs-chevron { width: 1rem; height: 1rem; flex-shrink: 0; opacity: 0.5; transition: transform 0.15s; }
    .cs-wrap.cs-open .cs-chevron { transform: rotate(180deg); }
    .cs-list {
      position: absolute; z-index: 200; top: calc(100% + 4px); left: 0; right: 0;
      background-color: #1a0808 !important;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 0.5rem;
      max-height: 16rem; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      padding: 0.25rem;
      margin: 0;
    }
    .cs-list.hidden { display: none; }
    .cs-list .cs-opt,
    .cs-list li.cs-opt {
      padding: 0.45rem 0.65rem;
      cursor: pointer;
      background-color: #1a0808 !important;
      color: #e5e7eb !important;
      font-size: 0.8125rem;
      border-radius: 0.25rem;
      transition: background-color 0.1s;
      list-style: none;
      margin: 0;
    }
    .cs-list .cs-opt:hover,
    .cs-list li.cs-opt:hover { background-color: #301616 !important; }
    .cs-list .cs-opt.cs-selected,
    .cs-list li.cs-opt.cs-selected { background-color: #3d1a1a !important; color: #fca5a5 !important; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Navbar -->
  <nav class="navbar navbar-blur sticky top-0 z-50 px-6 py-3">
    <div class="flex-1 flex items-center gap-3">
      <a href="/" class="flex items-center" style="text-decoration: none; gap: 0;">
        <span class="font-extrabold text-white" style="font-size: 1.35rem; letter-spacing: -0.03em; line-height: 1;">Real</span>
        <span class="font-extrabold text-white" style="font-size: 1.35rem; background: #BF181B; padding: 1px 7px 2px; margin-left: 3px; border-radius: 3px; line-height: 1.25; letter-spacing: -0.01em;">94</span>
      </a>
    </div>
    <div class="flex-none flex gap-1">
      <a href="/" class="btn btn-ghost btn-sm text-gray-300 hover:text-brand hover:bg-transparent">Nova Cotação</a>
      <a href="/historico" class="btn btn-ghost btn-sm text-gray-300 hover:text-brand hover:bg-transparent">Histórico</a>
    </div>
  </nav>

  <!-- Conteúdo principal -->
  <main class="{% block main_class %}container mx-auto px-4 py-8 max-w-5xl{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <!-- Toast de notificações globais -->
  <div id="toast-container" class="toast toast-end z-50"></div>

  <script>
    document.body.addEventListener("htmx:afterSettle", () => {
      document.querySelectorAll(".toast .alert").forEach(el => {
        setTimeout(() => el.remove(), 4000);
      });
    });

    // ── Custom Select Component ─────────────────────────────
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.cs-wrap')) {
        document.querySelectorAll('.cs-wrap.cs-open').forEach(function(w) {
          w.classList.remove('cs-open');
          var l = w.querySelector('.cs-list');
          if (l) l.classList.add('hidden');
        });
      }
    });

    function csToggle(btn) {
      var wrap = btn.closest('.cs-wrap');
      var list = wrap.querySelector('.cs-list');
      var isOpen = wrap.classList.contains('cs-open');
      document.querySelectorAll('.cs-wrap.cs-open').forEach(function(w) {
        if (w !== wrap) { w.classList.remove('cs-open'); var l=w.querySelector('.cs-list'); if(l) l.classList.add('hidden'); }
      });
      wrap.classList.toggle('cs-open', !isOpen);
      if (list) list.classList.toggle('hidden', isOpen);
    }

    function csSelect(optEl) {
      var wrap = optEl.closest('.cs-wrap');
      var input = wrap.querySelector('.cs-input');
      var label = wrap.querySelector('.cs-label');
      wrap.querySelectorAll('.cs-opt').forEach(function(o) { o.classList.remove('cs-selected'); });
      optEl.classList.add('cs-selected');
      if (input) input.value = optEl.dataset.value;
      if (label) label.textContent = optEl.textContent.trim();
      wrap.classList.remove('cs-open');
      var list = wrap.querySelector('.cs-list');
      if (list) list.classList.add('hidden');
      if (input) input.dispatchEvent(new Event('change', { bubbles: true }));
    }

    function csSetOptions(wrapId, options) {
      var wrap = document.getElementById(wrapId);
      if (!wrap) return;
      var list = wrap.querySelector('.cs-list');
      var input = wrap.querySelector('.cs-input');
      var label = wrap.querySelector('.cs-label');
      var cur = input ? input.value : '';
      list.innerHTML = options.map(function(o) {
        var sel = o.v === cur ? ' cs-selected' : '';
        return '<li class="cs-opt' + sel + '" data-value="' + o.v + '" onclick="csSelect(this)">' + o.t + '</li>';
      }).join('');
      var selected = list.querySelector('.cs-selected') || list.querySelector('.cs-opt');
      if (selected) {
        list.querySelectorAll('.cs-opt').forEach(function(o){ o.classList.remove('cs-selected'); });
        selected.classList.add('cs-selected');
        if (label) label.textContent = selected.textContent.trim();
        if (input) input.value = selected.dataset.value;
      }
    }

    function csSetDisabled(wrapId, disabled) {
      var wrap = document.getElementById(wrapId);
      if (!wrap) return;
      var btn = wrap.querySelector('.cs-btn');
      var input = wrap.querySelector('.cs-input');
      if (btn) btn.classList.toggle('cs-disabled', disabled);
      if (input) input.disabled = disabled;
      var fc = wrap.closest('.form-control');
      if (fc) fc.style.opacity = disabled ? '0.35' : '1';
    }

    function csSetHidden(wrapId, hidden) {
      var wrap = document.getElementById(wrapId);
      if (!wrap) return;
      wrap.classList.toggle('hidden', hidden);
      var input = wrap.querySelector('.cs-input');
      if (input) input.disabled = hidden;
    }
  </script>
</body>
</html>
