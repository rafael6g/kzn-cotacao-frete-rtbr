<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cotações{% endblock %} — Real94</title>

  <!-- DaisyUI + Tailwind via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <!-- SSE extension -->
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>

  <style>
    /* ── Custom tokens ── */
    :root {
      --brand: #BF181B;
      --brand-light: #E92320;
      --brand-glow: rgba(191, 24, 27, 0.40);
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.10);
      --surface: #180a0a;
      --surface-2: #1e0c0c;
    }

    body {
      background-color: #0d0808;
      color: #f0eded;
    }

    /* ── Glass card ── */
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1rem;
    }

    /* ── Glow effect for primary buttons ── */
    .btn-brand {
      background: var(--brand);
      color: #fff;
      border: none;
      box-shadow: 0 0 18px var(--brand-glow);
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .btn-brand:hover {
      background: var(--brand-light);
      box-shadow: 0 0 30px var(--brand-glow);
      transform: translateY(-1px);
    }

    /* ── Input focus ring ── */
    .input:focus, .select:focus, .file-input:focus {
      outline: 2px solid var(--brand);
      outline-offset: 1px;
    }

    /* ── SSE animations ── */
    .sse-item-novo { animation: fadeSlide 0.35s ease-out; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Log box ── */
    .log-box {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      border-radius: 0.5rem;
    }

    /* ── Navbar blur ── */
    .navbar-blur {
      background: rgba(13, 8, 8, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
    }

    /* ── Green accent text ── */
    .text-brand { color: var(--brand-light); }
    .text-brand-dim { color: var(--brand); }

    /* ── Section divider ── */
    .section-divider {
      border-color: var(--glass-border);
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Navbar -->
  <nav class="navbar navbar-blur sticky top-0 z-50 px-6 py-3">
    <div class="flex-1 flex items-center gap-3">
      <a href="/" class="flex items-center" style="text-decoration: none; gap: 0;">
        <span class="font-extrabold text-white" style="font-size: 1.35rem; letter-spacing: -0.03em; line-height: 1;">Real</span>
        <span class="font-extrabold text-white" style="font-size: 1.35rem; background: #BF181B; padding: 1px 7px 2px; margin-left: 3px; border-radius: 3px; line-height: 1.25; letter-spacing: -0.01em;">94</span>
      </a>
    </div>
    <div class="flex-none flex gap-1">
      <a href="/" class="btn btn-ghost btn-sm text-gray-300 hover:text-brand hover:bg-transparent">Nova Cotação</a>
      <a href="/historico" class="btn btn-ghost btn-sm text-gray-300 hover:text-brand hover:bg-transparent">Histórico</a>
    </div>
  </nav>

  <!-- Conteúdo principal -->
  <main class="{% block main_class %}container mx-auto px-4 py-8 max-w-5xl{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <!-- Toast de notificações globais -->
  <div id="toast-container" class="toast toast-end z-50"></div>

  <script>
    document.body.addEventListener("htmx:afterSettle", () => {
      document.querySelectorAll(".toast .alert").forEach(el => {
        setTimeout(() => el.remove(), 4000);
      });
    });
  </script>
</body>
</html>
